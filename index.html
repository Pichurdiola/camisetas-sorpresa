<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Camisetas Sorpresa</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080d18; color: #e2e8f0; font-family: 'DM Sans', sans-serif; }
    input::placeholder { color: #334155; }
    input:focus, select:focus { outline: none; border-color: #f59e0b !important; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer { 0% { background-position:-400px 0; } 100% { background-position:400px 0; } }
    @keyframes glow { 0%,100% { box-shadow:0 0 24px #f59e0b44; } 50% { box-shadow:0 0 48px #f59e0b99; } }
    @keyframes modalIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const SHEET_ID   = "1w_XQPu6s0fqM-0oajm6nqO_Qe6bdFBkQQaVk_UCnHdU";
    const SHEET_NAME = "BBDD GENERAL";
    const CLIENT_ID  = "1002178090025-gj5qqv7kdtorhb8mlbq5b75m4cf0dbr0.apps.googleusercontent.com";
    const SCOPES     = "https://www.googleapis.com/auth/spreadsheets";

    const COL = {
      FECHA:        0, CATEGORIA:   1, UDs:         2, EQUIPO:      3,
      TEMP:         4, EQ:          5, COLORES:     6, TALLA:       7,
      REF:          8, CAJA:        9, LIGA:        10, MARCA:      11,
      PRECIO_VENTA: 13, VENDIDA:   14, FECHA_VENTA: 15, NUM_PEDIDO: 17,
      VENDEDOR:     19, ESCUDO:    21,
    };

    const VENDEDORES    = ["JUAN","HECTOR","CESAR","ERIC"];
    const TALLAS_ADULTO = ["S","M","L","XL","XXL","3XL","4XL"];
    const TALLAS_NINO   = ["116","128","140","152","164"];
    const FAKE = ["Porto","Utrecht","Ferencvaros","Barcelona","Madrid","City","Bayern","Juve","PSG","Milan","Ajax","Arsenal","Liverpool","Atleti"];
    const CAJA_COLORS = ["#60a5fa","#4ade80","#f59e0b","#fb923c","#a78bfa","#34d399","#f472b6","#38bdf8","#e879f9","#fde68a","#94a3b8","#ff6b6b","#ffd93d","#6bcb77","#4d96ff"];

    const getCajaColor = (caja, allCajas) => CAJA_COLORS[allCajas.indexOf(caja) % CAJA_COLORS.length] || "#64748b";

    function formatDate(date) {
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${date.getDate()}-${months[date.getMonth()]}-${date.getFullYear()}`;
    }

    const CAJAS_CON_BUFANDA = ["ELITE","RETRO","PREMIUM"];
    function buildShopifyLine(shirt) {
      const dataLine = [shirt.categoria, shirt.uds||"1", shirt.equipo, shirt.temp, shirt.eq, shirt.colores, shirt.talla, shirt.ref, shirt.caja].join(" | ");
      const needsBufanda = CAJAS_CON_BUFANDA.some(c => (shirt.categoria||"").toUpperCase().includes(c));
      return dataLine + "\nJugón:" + (needsBufanda ? "\nBufanda:" : "");
    }

    function loadScript(src) {
      return new Promise(resolve => {
        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
        const s = document.createElement("script");
        s.src = src; s.onload = resolve; document.head.appendChild(s);
      });
    }

    function Escudo({ url, equipo, size=40 }) {
      if (!url) return <div style={{ width:size, height:size, flexShrink:0 }}/>;
      return <img src={url} alt={equipo} style={{ width:size, height:size, objectFit:"contain", flexShrink:0 }} onError={e => e.currentTarget.style.display="none"}/>;
    }

    const ShirtSVG = ({ color="#fff", size=56 }) => (
      <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
        <path d="M30 8 L8 30 L24 37 L24 92 L76 92 L76 37 L92 30 L70 8 C64 22 56 28 50 28 C44 28 36 22 30 8Z"
          fill={color} stroke="rgba(255,255,255,0.18)" strokeWidth="2"/>
      </svg>
    );

    function SlotText({ spinning, value }) {
      const [display, setDisplay] = useState("· · ·");
      useEffect(() => {
        if (!spinning) { setDisplay(value || "· · ·"); return; }
        let i = 0;
        const iv = setInterval(() => setDisplay(FAKE[i++ % FAKE.length]), 75);
        return () => clearInterval(iv);
      }, [spinning, value]);
      return (
        <span style={{ fontFamily:"'Bebas Neue',Impact,sans-serif", fontSize:"clamp(1.8rem,4vw,3rem)", letterSpacing:"0.06em", color:spinning?"#fbbf24":"#f8fafc", transition:"color .4s", display:"block", textAlign:"center" }}>
          {display}
        </span>
      );
    }

    const Badge = ({ txt, color="#4ade80" }) => txt ? (
      <span style={{ background:`${color}22`, border:`1px solid ${color}55`, color, borderRadius:6, padding:"2px 8px", fontSize:"0.66rem", fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", whiteSpace:"nowrap" }}>
        {txt}
      </span>
    ) : null;

    function ConfirmModal({ shirt, allCajas, onConfirm, onCancel, saving }) {
      const [numPedido,   setNumPedido]   = useState("");
      const [vendedor,    setVendedor]    = useState("");
      const [precioVenta, setPrecioVenta] = useState("");
      const [error,       setError]       = useState("");

      const handleConfirm = () => {
        if (!precioVenta.trim() || isNaN(precioVenta.replace(',','.'))) { setError("Introduce el precio de venta."); return; }
        if (!numPedido.trim()) { setError("Introduce el número de pedido."); return; }
        if (!vendedor)         { setError("Selecciona el vendedor."); return; }
        setError("");
        onConfirm(parseFloat(precioVenta.trim().replace(',','.')), numPedido.trim(), vendedor);
      };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:20 }}>
          <div style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:20, padding:"32px 28px", maxWidth:460, width:"100%", animation:"modalIn .25s ease" }}>
            <div style={{ textAlign:"center", marginBottom:24 }}>
              <ShirtSVG color={getCajaColor(shirt.categoria, allCajas)} size={48}/>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.6rem", color:"#f8fafc", marginTop:8 }}>{shirt.equipo}</div>
              <div style={{ display:"flex", gap:6, justifyContent:"center", flexWrap:"wrap", marginTop:8 }}>
                <Badge txt={shirt.talla} color="#60a5fa"/>
                <Badge txt={shirt.categoria} color={getCajaColor(shirt.categoria, allCajas)}/>
                <Badge txt={shirt.temp} color="#94a3b8"/>
                <Badge txt={shirt.marca} color="#34d399"/>
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <div>
                <label style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.15em", textTransform:"uppercase", color:"#f59e0b", display:"block", marginBottom:6 }}>Precio de Venta (€)</label>
                <div style={{ position:"relative" }}>
                  <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", color:"#64748b", fontSize:"1rem" }}>€</span>
                  <input value={precioVenta} onChange={e => setPrecioVenta(e.target.value)} placeholder="Ej: 29.99" type="number" min="0" step="0.01"
                    style={{ width:"100%", padding:"11px 14px 11px 28px", background:"#080d18", border:"2px solid #1e293b", borderRadius:10, color:"#e2e8f0", fontSize:"0.95rem" }} autoFocus/>
                </div>
              </div>
              <div>
                <label style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.15em", textTransform:"uppercase", color:"#f59e0b", display:"block", marginBottom:6 }}>Nº de Pedido del Cliente</label>
                <input value={numPedido} onChange={e => setNumPedido(e.target.value)} onKeyDown={e => e.key==="Enter" && handleConfirm()} placeholder="Ej: CFS52412"
                  style={{ width:"100%", padding:"11px 14px", background:"#080d18", border:"2px solid #1e293b", borderRadius:10, color:"#e2e8f0", fontSize:"0.95rem" }}/>
              </div>
              <div>
                <label style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.15em", textTransform:"uppercase", color:"#f59e0b", display:"block", marginBottom:6 }}>Vendedor</label>
                <div style={{ display:"flex", gap:8 }}>
                  {VENDEDORES.map(v => (
                    <button key={v} onClick={() => setVendedor(v)} style={{ flex:1, padding:"10px 0", borderRadius:10, border:`2px solid ${vendedor===v?"#4ade80":"#1e293b"}`, background:vendedor===v?"#4ade8014":"#080d18", cursor:"pointer", fontFamily:"'Bebas Neue',sans-serif", fontSize:"1rem", letterSpacing:"0.08em", color:vendedor===v?"#4ade80":"#64748b", transition:"all .15s" }}>
                      {v}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ background:"#080d18", border:"1px solid #1e293b", borderRadius:10, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ fontSize:"0.72rem", color:"#475569", textTransform:"uppercase", letterSpacing:"0.1em" }}>Fecha de venta</span>
                <span style={{ fontSize:"0.9rem", color:"#94a3b8", fontWeight:600 }}>{formatDate(new Date())}</span>
              </div>
              {error && <div style={{ background:"#f8711818", border:"1px solid #f8711850", borderRadius:8, padding:"10px 14px", color:"#f87178", fontSize:"0.84rem" }}>⚠️ {error}</div>}
              <div style={{ display:"flex", gap:10, marginTop:4 }}>
                <button onClick={onCancel} style={{ flex:1, padding:"12px", background:"transparent", border:"2px solid #1e293b", borderRadius:10, cursor:"pointer", fontWeight:600, fontSize:"0.9rem", color:"#64748b" }}>Cancelar</button>
                <button onClick={handleConfirm} disabled={saving} style={{ flex:2, padding:"12px", background:saving?"#1e293b":"linear-gradient(135deg,#4ade80,#22c55e)", border:"none", borderRadius:10, cursor:saving?"not-allowed":"pointer", fontWeight:700, fontSize:"0.95rem", color:saving?"#64748b":"#080d18" }}>
                  {saving ? "⏳ Guardando..." : "✅ Confirmar venta"}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function BarChart({ labels, data, colors }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        const existing = Chart.getChart(ref.current);
        if (existing) existing.destroy();
        new Chart(ref.current, {
          type: "bar",
          data: { labels, datasets: [{ data, backgroundColor: (colors && colors.length) ? colors : labels.map((_,i) => `hsl(${i*37},70%,55%)`), borderRadius:6, borderSkipped:false }] },
          options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y} uds`}} }, scales:{ x:{grid:{color:"#1e293b"},ticks:{color:"#64748b",font:{size:11}}}, y:{grid:{color:"#1e293b"},ticks:{color:"#64748b"},beginAtZero:true} } }
        });
      }, [labels, data]);
      return <canvas ref={ref} style={{ width:"100%", height:"100%" }}/>;
    }

    function LineChart({ labels, data }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        const existing = Chart.getChart(ref.current);
        if (existing) existing.destroy();
        new Chart(ref.current, {
          type: "line",
          data: { labels, datasets: [{ data, fill:true, backgroundColor:"rgba(245,158,11,0.1)", borderColor:"#f59e0b", borderWidth:2, pointBackgroundColor:"#f59e0b", pointRadius:4, tension:0.3 }] },
          options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y} ventas`}} }, scales:{ x:{grid:{color:"#1e293b"},ticks:{color:"#64748b",font:{size:11},maxRotation:45}}, y:{grid:{color:"#1e293b"},ticks:{color:"#64748b"},beginAtZero:true} } }
        });
      }, [labels, data]);
      return <canvas ref={ref} style={{ width:"100%", height:"100%" }}/>;
    }

    const StatCard = ({ icon, label, value, color="#f59e0b" }) => (
      <div style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:14, padding:"20px 24px", display:"flex", alignItems:"center", gap:16 }}>
        <div style={{ fontSize:"2rem" }}>{icon}</div>
        <div>
          <div style={{ fontSize:"0.65rem", color:"#475569", textTransform:"uppercase", letterSpacing:"0.15em", marginBottom:4 }}>{label}</div>
          <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:"2rem", color, letterSpacing:"0.05em" }}>{value}</div>
        </div>
      </div>
    );

    const ChartBox = ({ title, height=260, children }) => (
      <div style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:14, padding:"20px 24px" }}>
        <div style={{ fontSize:"0.7rem", fontWeight:600, letterSpacing:"0.15em", textTransform:"uppercase", color:"#f59e0b", marginBottom:16 }}>{title}</div>
        <div style={{ height }}>{children}</div>
      </div>
    );

    function StatsTab({ shirts, allCajas }) {
      const [periodo,    setPeriodo]    = useState("todo");
      const [fechaDesde, setFechaDesde] = useState("");
      const [fechaHasta, setFechaHasta] = useState("");

      const parseDate = val => {
        if (!val) return null;
        const s = String(val).trim();
        if (!s) return null;
        const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11,Ene:0,Abr:3,Ago:7,Dic:11};
        const m1 = s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/);
        if (m1) { const d=parseInt(m1[1]),mo=months[m1[2]],y=parseInt(m1[3]); if(!isNaN(d)&&mo!==undefined&&!isNaN(y)) return new Date(y,mo,d); }
        const m2 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (m2) return new Date(parseInt(m2[3]),parseInt(m2[2])-1,parseInt(m2[1]));
        const m3 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (m3) return new Date(parseInt(m3[1]),parseInt(m3[2])-1,parseInt(m3[3]));
        const m4 = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
        if (m4) return new Date(parseInt(m4[3]),parseInt(m4[2])-1,parseInt(m4[1]));
        const d = new Date(s);
        return isNaN(d.getTime()) ? null : d;
      };

      const now = new Date();
      const periodos = [
        { id:"todo", label:"Todo" }, { id:"7d", label:"7 días" }, { id:"1m", label:"1 mes" },
        { id:"3m", label:"3 meses" }, { id:"1y", label:"1 año" }, { id:"custom", label:"Personalizado" },
      ];

      const vendidas = shirts.filter(s => s.vendida);
      const ventasFiltradas = vendidas.filter(s => {
        if (periodo === "todo") return true;
        const fecha = parseDate(s.fechaVenta);
        if (!fecha) return false;
        if (periodo === "custom") {
          const desde = fechaDesde ? new Date(fechaDesde + "T00:00:00") : null;
          const hasta  = fechaHasta ? new Date(fechaHasta + "T23:59:59") : null;
          if (desde && fecha < desde) return false;
          if (hasta  && fecha > hasta)  return false;
          return true;
        }
        const dias = { "7d":7, "1m":30, "3m":90, "1y":365 }[periodo];
        const desde = new Date(now); desde.setDate(desde.getDate() - dias);
        return fecha >= desde;
      });

      const tallasMap = {};
      ventasFiltradas.forEach(s => { tallasMap[s.talla] = (tallasMap[s.talla]||0) + 1; });
      const tallasOrden  = Object.entries(tallasMap).sort((a,b) => b[1]-a[1]);
      const tallasLabels = tallasOrden.map(([t]) => t);
      const tallasData   = tallasOrden.map(([,v]) => v);

      const cajasMap = {};
      ventasFiltradas.forEach(s => { cajasMap[s.categoria] = (cajasMap[s.categoria]||0) + 1; });
      const cajasOrden  = Object.entries(cajasMap).sort((a,b) => b[1]-a[1]);
      const cajasLabels = cajasOrden.map(([c]) => c);
      const cajasData   = cajasOrden.map(([,v]) => v);
      const cajasColors = cajasLabels.map(c => getCajaColor(c, allCajas));

      const fechaMap = {};
      ventasFiltradas.forEach(s => {
        if (s.fechaVenta) {
          const d = parseDate(s.fechaVenta);
          if (d) {
            const key = d.toLocaleDateString("es-ES", {day:"2-digit", month:"short", year:"numeric"});
            fechaMap[key] = (fechaMap[key]||0) + 1;
          }
        }
      });
      const fechasOrden  = Object.entries(fechaMap).sort((a,b) => new Date(a[0]) - new Date(b[0]));
      const fechasLabels = fechasOrden.map(([f]) => f);
      const fechasData   = fechasOrden.map(([,v]) => v);

      const empty = <div style={{ color:"#334155", textAlign:"center", paddingTop:80, fontSize:"0.85rem" }}>Sin datos en este período</div>;

      return (
        <div style={{ maxWidth:1100, margin:"0 auto", padding:"32px 24px", animation:"fadeUp .35s ease" }}>
          <div style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:14, padding:"16px 20px", marginBottom:24 }}>
            <div style={{ fontSize:"0.65rem", fontWeight:600, letterSpacing:"0.18em", textTransform:"uppercase", color:"#f59e0b", marginBottom:12 }}>Período</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {periodos.map(p => (
                <button key={p.id} onClick={() => setPeriodo(p.id)}
                  style={{ padding:"7px 16px", borderRadius:8, border:"none", cursor:"pointer", fontWeight:600, fontSize:"0.8rem", background:periodo===p.id?"#f59e0b":"#1e293b", color:periodo===p.id?"#080d18":"#64748b", transition:"all .2s" }}>
                  {p.label}
                </button>
              ))}
            </div>
            {periodo === "custom" && (
              <div style={{ display:"flex", gap:12, marginTop:14, flexWrap:"wrap", alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:"0.72rem", color:"#64748b" }}>Desde</span>
                  <input type="date" value={fechaDesde} onChange={e => setFechaDesde(e.target.value)} style={{ padding:"7px 10px", background:"#080d18", border:"2px solid #1e293b", borderRadius:8, color:"#e2e8f0", fontSize:"0.82rem" }}/>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:"0.72rem", color:"#64748b" }}>Hasta</span>
                  <input type="date" value={fechaHasta} onChange={e => setFechaHasta(e.target.value)} style={{ padding:"7px 10px", background:"#080d18", border:"2px solid #1e293b", borderRadius:8, color:"#e2e8f0", fontSize:"0.82rem" }}/>
                </div>
              </div>
            )}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:12, marginBottom:24 }}>
            <StatCard icon="✅" label="Vendidas" value={ventasFiltradas.length} color="#4ade80"/>
            <StatCard icon="📦" label="Stock restante" value={shirts.filter(s=>!s.vendida).length} color="#60a5fa"/>
            <StatCard icon="📊" label="% vendido" value={(shirts.length ? Math.round(shirts.filter(s=>s.vendida).length/shirts.length*100) : 0)+"%"} color="#a78bfa"/>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))", gap:16 }}>
            <ChartBox title="Tallas más vendidas">
              {tallasLabels.length > 0 ? <BarChart key={tallasLabels.join(",")} labels={tallasLabels} data={tallasData}/> : empty}
            </ChartBox>
            <ChartBox title="Ventas por tipo de caja">
              {cajasLabels.length > 0 ? <BarChart key={cajasLabels.join(",")} labels={cajasLabels} data={cajasData} colors={cajasColors}/> : empty}
            </ChartBox>
            <ChartBox title="Evolución de ventas" height={260}>
              {fechasLabels.length > 0 ? <LineChart key={fechasLabels.join(",")} labels={fechasLabels} data={fechasData}/> : empty}
            </ChartBox>
          </div>
        </div>
      );
    }

    function PedidosTab({ shirts, allCajas }) {
      const [query,    setQuery]    = useState("");
      const [searched, setSearched] = useState("");

      const results = searched.trim()
        ? shirts.filter(s => s.vendida && (s.numPedido||"").toLowerCase().includes(searched.trim().toLowerCase()))
        : [];

      const grouped = results.reduce((acc, s) => {
        const key = s.numPedido;
        if (!acc[key]) acc[key] = [];
        acc[key].push(s);
        return acc;
      }, {});

      return (
        <div style={{ maxWidth:820, margin:"0 auto", padding:"32px 24px", animation:"fadeUp .35s ease" }}>
          <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.7rem", letterSpacing:"0.08em", marginBottom:6 }}>🔍 Buscar Pedido</div>
          <div style={{ color:"#475569", fontSize:"0.85rem", marginBottom:24 }}>Introduce el número de pedido para ver todas las camisetas asociadas.</div>

          <div style={{ display:"flex", gap:10, marginBottom:28 }}>
            <div style={{ position:"relative", flex:1 }}>
              <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", color:"#475569", fontSize:"1rem" }}>🔍</span>
              <input value={query} onChange={e => setQuery(e.target.value)}
                onKeyDown={e => e.key==="Enter" && setSearched(query)}
                placeholder="Ej: CFS52412"
                style={{ width:"100%", padding:"13px 14px 13px 40px", background:"#0f172a", border:"2px solid #1e293b", borderRadius:12, color:"#e2e8f0", fontSize:"1rem" }}
                autoFocus/>
            </div>
            <button onClick={() => setSearched(query)}
              style={{ padding:"13px 28px", background:"linear-gradient(135deg,#f59e0b,#d97706)", border:"none", borderRadius:12, cursor:"pointer", fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.1rem", letterSpacing:"0.1em", color:"#080d18", fontWeight:700 }}>
              BUSCAR

            );

        function App() {
      const [authStatus,  setAuthStatus]  = useState("idle");
      const [authError,   setAuthError]   = useState("");
      const tokenRef = useRef(null);

      const [shirts,       setShirts]       = useState([]);
      const [loadingSheet, setLoadingSheet] = useState(false);
      const [sheetError,   setSheetError]   = useState("");

      const [tab,        setTab]        = useState("sorteo");
      const [caja,       setCaja]       = useState("");
      const [talla,      setTalla]      = useState("");
      const [descInput,  setDescInput]  = useState("");
      const [descartes,  setDescartes]  = useState([]);
      const [spinning,   setSpinning]   = useState(false);
      const [result,     setResult]     = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [formError,  setFormError]  = useState("");
      const [saving,     setSaving]     = useState(false);

      const [adminFilter,setAdminFilter]= useState("disponibles");

      const [copyText,   setCopyText]   = useState("");
      const [historial,  setHistorial]  = useState([]);
      const [pendingSale, setPendingSale] = useState(null);
      const [sorteoMode,  setSorteoMode]  = useState("simple"); // "simple" | "multi"
      const [pedidoLineas, setPedidoLineas] = useState([]); // [{id, caja, talla, descartes, descInput}]
      const [multiResults, setMultiResults] = useState(null); // array of results
      const [multiSaving,  setMultiSaving]  = useState(false);
      const [multiConfirmed, setMultiConfirmed] = useState([]); // indices confirmed
      const [showMultiConfirm, setShowMultiConfirm] = useState(false);

      const total    = shirts.length;

      const disp     = total - vendidas;

      const simplePoolCount = (caja && talla)

        : null;

        ? `La caja "${caja}" no tiene stock disponible.`

      const fetchSheet = useCallback(async () => {
        setLoadingSheet(true); setSheetError("");
        try {
          const res = await window.gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: SHEET_ID, range:`${SHEET_NAME}!A2:V`, valueRenderOption:"FORMATTED_VALUE",
          });
          setShirts((res.result.values||[]).map((r,i) => ({
            rowIndex:  i+2,
            uds:       r[COL.UDs]         != null ? String(r[COL.UDs])         : "1",
            fecha:     r[COL.FECHA]       != null ? String(r[COL.FECHA])       : "",
            categoria: r[COL.CATEGORIA]   != null ? String(r[COL.CATEGORIA])   : "",
            equipo:    r[COL.EQUIPO]      != null ? String(r[COL.EQUIPO])      : "",
            temp:      r[COL.TEMP]        != null ? String(r[COL.TEMP])        : "",
            eq:        r[COL.EQ]          != null ? String(r[COL.EQ])          : "",
            colores:   r[COL.COLORES]     != null ? String(r[COL.COLORES])     : "",
            talla:     r[COL.TALLA]       != null ? String(r[COL.TALLA])       : "",
            ref:       r[COL.REF]         != null ? String(r[COL.REF])         : "",
            caja:      r[COL.CAJA]        != null ? String(r[COL.CAJA])        : "",
            liga:      r[COL.LIGA]        != null ? String(r[COL.LIGA])        : "",
            marca:     r[COL.MARCA]       != null ? String(r[COL.MARCA])       : "",
            pvp:       r[COL.PRECIO_VENTA] != null ? String(r[COL.PRECIO_VENTA]) : "",
            vendida:   (r[COL.VENDIDA] != null ? String(r[COL.VENDIDA]) : "").toUpperCase() === "SI" ||
                       (r[COL.VENDIDA] != null ? String(r[COL.VENDIDA]) : "").toUpperCase() === "SÍ",
            fechaVenta: r[COL.FECHA_VENTA] != null ? String(r[COL.FECHA_VENTA]) : "",
            numPedido:  r[COL.NUM_PEDIDO]  != null ? String(r[COL.NUM_PEDIDO])  : "",
            vendedor:   r[COL.VENDEDOR]    != null ? String(r[COL.VENDEDOR])    : "",
            escudo:     r[COL.ESCUDO]      != null ? String(r[COL.ESCUDO])      : "",
          })));
        } catch(e) {
          const msg = e.result?.error?.message || String(e);
          if (msg.includes("401") || msg.includes("Invalid") || msg.includes("unauthorized")) {
            setAuthStatus("reconnect");
          } else {
            setSheetError("Error al leer la hoja: " + msg);
          }
        } finally { setLoadingSheet(false); }
      }, []);

      const initAuth = useCallback(async () => {
        setAuthStatus("loading"); setAuthError("");
        try {
          await Promise.all([loadScript("https://apis.google.com/js/api.js"), loadScript("https://accounts.google.com/gsi/client")]);
          await new Promise((res,rej) => window.gapi.load("client",{callback:res,onerror:rej}));
          await window.gapi.client.init({ discoveryDocs:["https://sheets.googleapis.com/$discovery/rest?version=v4"] });
          await new Promise((resolve, reject) => {
            const client = window.google.accounts.oauth2.initTokenClient({
              client_id: CLIENT_ID, scope: SCOPES,
              callback: resp => { if (resp.error) { reject(resp.error); return; } resolve(); },
            });
            client.requestAccessToken({ prompt: "" });
            tokenRef.current = client;
          });
          fetchSheet();
          setAuthStatus("selectUser");
        } catch(e) { setAuthError(String(e?.message||e)); setAuthStatus("error"); }
      }, []);

      const markSold = useCallback(async (shirt, precioVenta, numPedido, vendedor) => {
        setSaving(true);
        try {
          const fechaVenta = formatDate(new Date());
          await window.gapi.client.sheets.spreadsheets.values.batchUpdate({
            spreadsheetId: SHEET_ID,
            resource: {
              valueInputOption: "RAW",
              data: [
                { range:`${SHEET_NAME}!N${shirt.rowIndex}`, values:[[precioVenta]] },
                { range:`${SHEET_NAME}!O${shirt.rowIndex}`, values:[["SI"]] },
                { range:`${SHEET_NAME}!P${shirt.rowIndex}`, values:[[fechaVenta]] },
                { range:`${SHEET_NAME}!R${shirt.rowIndex}`, values:[[numPedido]] },
                { range:`${SHEET_NAME}!T${shirt.rowIndex}`, values:[[vendedor]] },

            }
          });
          setShirts(prev => prev.map(s => s.rowIndex===shirt.rowIndex
            ? {...s, vendida:true, pvp:precioVenta, fechaVenta, numPedido, vendedor} : s
          ));
        } catch(e) {
          const msg = e.result?.error?.message || String(e);
          if (msg.includes("401") || msg.includes("Invalid") || msg.includes("unauthorized")) {
            setPendingSale({ shirt, precioVenta, numPedido, vendedor });
            setAuthStatus("reconnect");

        finally { setSaving(false); }

      const handleSorteo = useCallback(() => {
        setFormError(""); setResult(null); setShowResult(false);
        if (!caja||!talla) { setFormError("Selecciona el tipo de caja y la talla."); return; }
        const pool = shirts.filter(s =>
          s.categoria === caja &&
          (s.talla||"").trim().toUpperCase() === talla.toUpperCase() &&
          !s.vendida &&
          !descartes.some(d => (s.equipo||"").toLowerCase().includes(d.toLowerCase()))
        );
        if (!pool.length) { setFormError("No hay camisetas disponibles con esos filtros."); return; }
        setSpinning(true);
        setTimeout(() => {
          const stockPorEquipo = {};
          pool.forEach(s => { const k = s.equipo||"UNKNOWN"; stockPorEquipo[k] = (stockPorEquipo[k]||0) + 1; });
          const pesos = pool.map(s => Math.pow(stockPorEquipo[s.equipo||"UNKNOWN"], 0.6));

          </div>

            </div>
          )}
          <button onClick={initAuth} disabled={authStatus==="loading"} style={{ padding:"14px 44px", borderRadius:12, background:"linear-gradient(135deg,#38bdf8,#0284c7)", border:"none", cursor:authStatus==="loading"?"not-allowed":"pointer", color:"#fff", fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.25rem", letterSpacing:"0.12em", opacity:authStatus==="loading"?.7:1, boxShadow:"0 4px 24px #38bdf833" }}>

        <div style={{ minHeight:"100vh", background:"#080d18" }}>


          {/* MODAL RESULTADOS MÚLTIPLES */}
          {multiResults && !showMultiConfirm && (

                            <Escudo url={r.escudo} equipo={r.equipo} size={36}/>
                            <div>
                              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.2rem", color:"#f8fafc", letterSpacing:"0.06em", marginBottom:4 }}>{r.equipo}</div>
                              <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                                <Badge txt={r.talla} color="#60a5fa"/>
                                <Badge txt={r.temp} color="#94a3b8"/>
                                <Badge txt={r.eq} color="#38bdf8"/>
                                <Badge txt={r.marca} color="#34d399"/>
                                {r.colores && <Badge txt={r.colores} color="#f472b6"/>}
                                <Badge txt={r.caja} color={col}/>
                              </div>
                            </div>
                          </div>
                        ) : (

                      style={{ flex:2, padding:"12px", background:"linear-gradient(135deg,#4ade80,#22c55e)", border:"none", borderRadius:10, cursor:"pointer", fontWeight:700, fontSize:"0.95rem", color:"#080d18" }}>
                      ✅ Confirmar selección
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* MODAL CONFIRMAR PEDIDO MÚLTIPLE */}
          {multiResults && showMultiConfirm && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.85)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:160, padding:24, overflowY:"auto" }}>
              <div style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:20, padding:"32px 28px", maxWidth:480, width:"100%", animation:"modalIn .25s ease", maxHeight:"90vh", overflowY:"auto" }}>
                <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.4rem", color:"#f59e0b", letterSpacing:"0.1em", marginBottom:20 }}>📋 Datos del pedido</div>

                {/* PER-LINE PRICES */}
                <div style={{ marginBottom:14 }}>
                  <label style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.15em", textTransform:"uppercase", color:"#f59e0b", display:"block", marginBottom:10 }}>Precio por línea (€)</label>
                  <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                    {multiResults.filter(Boolean).map((r, i) => {
                      const col = getCajaColor(r.categoria, allCajas);
                      return (
                        <div key={r.rowIndex} style={{ display:"flex", alignItems:"center", gap:10, background:"#080d18", border:"1px solid #1e293b", borderRadius:10, padding:"8px 12px" }}>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:"0.7rem", color:col, fontWeight:600, marginBottom:1 }}>{r.categoria} · {r.talla}</div>
                            <div style={{ fontSize:"0.85rem", color:"#e2e8f0", fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.equipo}</div>
                          </div>
                          <div style={{ position:"relative", flexShrink:0 }}>
                            <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"#64748b", fontSize:"0.9rem" }}>€</span>
                            <input type="number" min="0" step="0.01" placeholder="0.00"
                              value={multiSaleInfo.precios[r.rowIndex]||""}
                              onChange={e => setMultiSaleInfo(p=>({...p, precios:{...p.precios, [r.rowIndex]:e.target.value}}))}
                              style={{ width:90, padding:"7px 8px 7px 22px", background:"#0f172a", border:`2px solid ${multiSaleInfo.precios[r.rowIndex]?"#f59e0b44":"#1e293b"}`, borderRadius:8, color:"#e2e8f0", fontSize:"0.9rem" }}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div style={{ display:"flex", flexDirection:"column", gap:14, marginBottom:20 }}>
                  <div>
                    <label style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.15em", textTransform:"uppercase", color:"#f59e0b", display:"block", marginBottom:6 }}>Nº de Pedido</label>
                    <input value={multiSaleInfo.numPedido} onChange={e => setMultiSaleInfo(p=>({...p,numPedido:e.target.value}))}
                      placeholder="Ej: CFS52412"
                      style={{ width:"100%", padding:"11px 14px", background:"#080d18", border:"2px solid #1e293b", borderRadius:10, color:"#e2e8f0", fontSize:"0.95rem" }} autoFocus/>
                  </div>
                  <div>
                    <label style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.15em", textTransform:"uppercase", color:"#f59e0b", display:"block", marginBottom:6 }}>Vendedor</label>
                    <div style={{ display:"flex", gap:8 }}>
                      {VENDEDORES.map(v => (
                        <button key={v} onClick={() => setMultiSaleInfo(p=>({...p,vendedor:v}))}
                          style={{ flex:1, padding:"10px 0", borderRadius:10, border:`2px solid ${multiSaleInfo.vendedor===v?"#4ade80":"#1e293b"}`, background:multiSaleInfo.vendedor===v?"#4ade8014":"#080d18", cursor:"pointer", fontFamily:"'Bebas Neue',sans-serif", fontSize:"1rem", color:multiSaleInfo.vendedor===v?"#4ade80":"#64748b", transition:"all .15s" }}>
                          {v}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div style={{ background:"#080d18", border:"1px solid #1e293b", borderRadius:10, padding:"10px 14px", display:"flex", justifyContent:"space-between" }}>
                    <span style={{ fontSize:"0.72rem", color:"#475569", textTransform:"uppercase", letterSpacing:"0.1em" }}>Fecha de venta</span>
                    <span style={{ fontSize:"0.9rem", color:"#94a3b8", fontWeight:600 }}>{formatDate(new Date())}</span>
                  </div>
                  {multiSaleError && <div style={{ background:"#f8711818", border:"1px solid #f8711850", borderRadius:8, padding:"10px 14px", color:"#f87178", fontSize:"0.84rem" }}>⚠️ {multiSaleError}</div>}
                </div>

                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={() => setShowMultiConfirm(false)} style={{ flex:1, padding:"12px", background:"transparent", border:"2px solid #1e293b", borderRadius:10, cursor:"pointer", color:"#64748b", fontWeight:600 }}>← Volver</button>
                  <button disabled={multiSaving} onClick={async () => {
                    if (!multiSaleInfo.numPedido.trim()) { setMultiSaleError("Introduce el número de pedido."); return; }
                    if (!multiSaleInfo.vendedor) { setMultiSaleError("Selecciona el vendedor."); return; }
                    const validResults = multiResults.filter(Boolean);
                    for (const r of validResults) {
                      const p = multiSaleInfo.precios[r.rowIndex];
                      if (!p || isNaN(String(p).replace(',','.'))) { setMultiSaleError(`Introduce el precio para ${r.equipo} (${r.talla}).`); return; }
                    }
                    setMultiSaleError("");
                    setMultiSaving(true);
                    const lines = [];
                    for (const r of validResults) {
                      try {
                        const precioNum = parseFloat(String(multiSaleInfo.precios[r.rowIndex]).replace(',','.'));
                        await markSold(r, precioNum, multiSaleInfo.numPedido.trim(), multiSaleInfo.vendedor);
                        const line = buildShopifyLine(r);
                        lines.push({ shirt:r, line });
                        setHistorial(prev => [{
                          equipo:r.equipo, talla:r.talla, categoria:r.categoria, caja:r.caja,
                          temp:r.temp, eq:r.eq, colores:r.colores,
                          hora:new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}),
                          line
                        }, ...prev]);
                      } catch(e) { /* handled inside markSold */ }
                    }
                    setMultiSaving(false);
                    setMultiResults(null);
                    setShowMultiConfirm(false);
                    setPedidoLineas([]);
                    setMultiCopyLines(lines);
                  }} style={{ flex:2, padding:"12px", background:multiSaving?"#1e293b":"linear-gradient(135deg,#4ade80,#22c55e)", border:"none", borderRadius:10, cursor:multiSaving?"not-allowed":"pointer", fontWeight:700, fontSize:"0.95rem", color:multiSaving?"#64748b":"#080d18" }}>
                    {multiSaving ? "⏳ Guardando..." : "✅ Guardar todo"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL COPIAR LÍNEAS MÚLTIPLES */}
          {multiCopyLines.length > 0 && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.8)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:24, overflowY:"auto" }}>
              <div style={{ background:"#0f172a", border:"2px solid #f59e0b", borderRadius:16, padding:"28px 32px", maxWidth:580, width:"100%", animation:"fadeUp .3s ease", maxHeight:"90vh", overflowY:"auto" }}>
                <div style={{ fontSize:"0.65rem", fontWeight:600, letterSpacing:"0.18em", textTransform:"uppercase", color:"#f59e0b", marginBottom:16 }}>📋 Copiar para Shopify</div>
                <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:20 }}>
                  {multiCopyLines.map((item, i) => (
                    <div key={i} style={{ background:"#080d18", border:"1px solid #1e293b", borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:"0.65rem", color:"#475569", marginBottom:4 }}>Línea {i+1} — {item.shirt.equipo}</div>
                        <div style={{ fontFamily:"monospace", fontSize:"0.82rem", color:"#e2e8f0", wordBreak:"break-all" }}>{item.line}</div>
                      </div>
                      <button onClick={() => navigator.clipboard.writeText(item.line).catch(()=>{})}
                        title="Copiar esta línea"
                        style={{ background:"#1e293b", border:"none", borderRadius:8, padding:"8px 12px", cursor:"pointer", color:"#f59e0b", fontSize:"0.8rem", flexShrink:0 }}>
                        📋
                      </button>
                    </div>
                  ))}
                </div>
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={() => { const all = multiCopyLines.map(l=>l.line).join("\n"); navigator.clipboard.writeText(all).catch(()=>{}); }}
                    style={{ flex:1, padding:"12px", background:"linear-gradient(135deg,#f59e0b,#d97706)", border:"none", borderRadius:10, cursor:"pointer", fontFamily:"'Bebas Neue',sans-serif", fontSize:"1rem", letterSpacing:"0.1em", color:"#080d18" }}>
                    📋 COPIAR TODO
                  </button>
                  <button onClick={() => setMultiCopyLines([])}
                    style={{ padding:"12px 20px", background:"transparent", border:"2px solid #1e293b", borderRadius:10, cursor:"pointer", color:"#64748b", fontSize:"0.9rem" }}>
                    Cerrar
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL RESULTADO SORTEO */}
          {(spinning || result) && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.8)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:150, padding:24 }}>
              <div style={{ background:"linear-gradient(135deg,#0f172a,#141d2f)", border:"2px solid #f59e0b40", borderRadius:20, padding:"36px 28px", maxWidth:480, width:"100%", textAlign:"center", animation:"modalIn .25s ease", position:"relative", overflow:"hidden" }}>
                <div style={{ position:"absolute", inset:0, background:"radial-gradient(ellipse at 50% -10%,#f59e0b18,transparent 65%)", pointerEvents:"none" }}/>
                <div style={{ marginBottom:8, opacity:.7 }}><ShirtSVG color="#f59e0b" size={60}/></div>
                <div style={{ fontSize:"0.64rem", letterSpacing:"0.2em", textTransform:"uppercase", color:"#475569", marginBottom:8 }}>Camiseta seleccionada</div>
                <SlotText spinning={spinning} value={result?.equipo}/>
                {!spinning && result && <div style={{ display:"flex", justifyContent:"center", margin:"8px 0" }}><Escudo url={result.escudo} equipo={result.equipo} size={64}/></div>}
                {showResult && result && (
                  <div style={{ animation:"fadeUp .3s ease" }}>
                    <div style={{ display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap", margin:"14px 0 28px" }}>
                      <Badge txt={result.talla} color="#60a5fa"/>
                      <Badge txt={result.caja} color={getCajaColor(result.categoria,allCajas)}/>
                      <Badge txt={result.liga} color="#a78bfa"/>
                      <Badge txt={result.temp} color="#94a3b8"/>
                      <Badge txt={result.marca} color="#34d399"/>
                      <Badge txt={result.colores} color="#f472b6"/>
                      {result.pvp && <Badge txt={"€"+result.pvp} color="#fde68a"/>}
                    </div>
                    <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
                      <button onClick={() => setShowModal(true)} style={{ padding:"12px 28px", background:"linear-gradient(135deg,#4ade80,#22c55e)", border:"none", borderRadius:10, cursor:"pointer", fontWeight:700, fontSize:"0.95rem", color:"#080d18" }}>✅ Confirmar venta</button>
                      <button onClick={() => { setResult(null); setShowResult(false); }} style={{ padding:"12px 22px", background:"transparent", border:"2px solid #1e293b", borderRadius:10, cursor:"pointer", fontWeight:600, fontSize:"0.95rem", color:"#64748b" }}>↩ Repetir</button>
                      <button onClick={() => { setResult(null); setShowResult(false); setSpinning(false); setDescartes([]); }} style={{ padding:"12px 22px", background:"transparent", border:"2px solid #f8711840", borderRadius:10, cursor:"pointer", fontWeight:600, fontSize:"0.95rem", color:"#f87178" }}>✕ Cancelar</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {showCopy && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:24 }} onClick={() => setShowCopy(false)}>
              <div onClick={e => e.stopPropagation()} style={{ background:"#0f172a", border:"2px solid #f59e0b", borderRadius:16, padding:"28px 32px", maxWidth:560, width:"100%", animation:"fadeUp .3s ease" }}>
                <div style={{ fontSize:"0.65rem", fontWeight:600, letterSpacing:"0.18em", textTransform:"uppercase", color:"#f59e0b", marginBottom:12 }}>📋 Copiar para Shopify</div>
                <div style={{ background:"#080d18", border:"1px solid #1e293b", borderRadius:10, padding:"14px 16px", fontFamily:"monospace", fontSize:"0.88rem", color:"#e2e8f0", marginBottom:20, wordBreak:"break-all", lineHeight:1.6 }}>
                  {copyText}
                </div>
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={() => navigator.clipboard.writeText(copyText).catch(()=>{})}
                    style={{ flex:1, padding:"12px", background:"linear-gradient(135deg,#f59e0b,#d97706)", border:"none", borderRadius:10, cursor:"pointer", fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.1rem", letterSpacing:"0.1em", color:"#080d18" }}>
                    📋 COPIAR
                  </button>
                  <button onClick={() => setShowCopy(false)} style={{ padding:"12px 20px", background:"transparent", border:"2px solid #1e293b", borderRadius:10, cursor:"pointer", color:"#64748b", fontSize:"0.9rem" }}>
                    Cerrar
                  </button>
                </div>
              </div>
            </div>
          )}

          {showModal && result && (
            <ConfirmModal shirt={result} allCajas={allCajas} onConfirm={handleConfirmSale} onCancel={() => setShowModal(false)} saving={saving}/>
          )}

          <header style={{ background:"linear-gradient(90deg,#0a0f1e,#0f172a)", borderBottom:"1px solid #1e293b", padding:"0 24px", height:60, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100, gap:16 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
              <span style={{ fontSize:"1.5rem" }}>⚽</span>

                                        style={{ width:52, height:52, borderRadius:8, border:`2px solid ${linea.talla===t?"#a78bfa":"#1e293b"}`, background:linea.talla===t?"#a78bfa14":"#080d18", cursor:"pointer", fontFamily:"'Bebas Neue',sans-serif", fontSize:"0.9rem", color:linea.talla===t?"#a78bfa":"#64748b", transition:"all .15s", position:"relative" }}>

                      // Validate all lines have caja+talla
                      for (let i=0; i<pedidoLineas.length; i++) {
                        const l = pedidoLineas[i];
                        if (!l.caja || !l.talla) { setFormError(`Línea ${i+1}: selecciona caja y talla.`); return; }
                        const pool = shirts.filter(s => s.categoria===l.caja && (s.talla||"").trim().toUpperCase()===l.talla.toUpperCase() && !s.vendida && !l.descartes.some(d=>(s.equipo||"").toLowerCase().includes(d.toLowerCase())));
                        if (!pool.length) { setFormError(`Línea ${i+1} (${l.caja} / ${l.talla}): sin stock disponible.`); return; }
                      }
                      setFormError("");
                      setSpinning(true);
                      setTimeout(() => {
                        const usedEquipos = new Set(); // track equipos already picked in this pedido
                        const warnings = [];
                        const results = pedidoLineas.map((l, idx) => {
                          // Filter pool: correct category+size+available+not discarded+NOT already used equipo
                          let pool = shirts.filter(s =>
                            s.categoria===l.caja &&
                            (s.talla||"").trim().toUpperCase()===l.talla.toUpperCase() &&
                            !s.vendida &&
                            !l.descartes.some(d=>(s.equipo||"").toLowerCase().includes(d.toLowerCase())) &&
                            !usedEquipos.has((s.equipo||"").toLowerCase())
                          );
                          // If no pool without repetition, fall back with warning
                          if (!pool.length) {
                            warnings.push(`Línea ${idx+1} (${l.caja} / ${l.talla}): no hay equipos distintos disponibles — se ha repetido equipo.`);
                            // fallback: allow already-used equipos
                            pool = shirts.filter(s =>
                              s.categoria===l.caja &&
                              (s.talla||"").trim().toUpperCase()===l.talla.toUpperCase() &&
                              !s.vendida &&
                              !l.descartes.some(d=>(s.equipo||"").toLowerCase().includes(d.toLowerCase()))
                            );
                          }
                          if (!pool.length) return null;
                          // Weighted random
                          const stockPorEquipo = {};
                          pool.forEach(s => { const k=s.equipo||"UNKNOWN"; stockPorEquipo[k]=(stockPorEquipo[k]||0)+1; });
                          // Deduplicate by equipo for selection (pick equipo first, then a shirt)
                          const equiposPool = [...new Set(pool.map(s=>s.equipo||"UNKNOWN"))];
                          const pesosPorEquipo = equiposPool.map(eq => Math.pow(stockPorEquipo[eq],0.6));
                          const totalPeso = pesosPorEquipo.reduce((a,b)=>a+b,0);
                          let rand = Math.random()*totalPeso;
                          let pickedEquipo = equiposPool[equiposPool.length-1];
                          for (let i=0;i<equiposPool.length;i++) { rand-=pesosPorEquipo[i]; if(rand<=0){pickedEquipo=equiposPool[i];break;} }
                          // Pick one shirt of that equipo
                          const shirtPool = pool.filter(s=>(s.equipo||"UNKNOWN")===pickedEquipo);
                          const picked = shirtPool[Math.floor(Math.random()*shirtPool.length)];
                          usedEquipos.add((picked.equipo||"").toLowerCase());
                          return { ...picked, _warning: null };
                        });
                        if (warnings.length) setFormError(warnings.join(" | "));

                    <div style={{ fontSize:"0.7rem", fontWeight:600, letterSpacing:"0.18em", textTransform:"uppercase", color:"#f59e0b" }}>🕒 Historial de sesión</div>
                    <button onClick={() => { setHistorial([]); if(userName) localStorage.removeItem("historial_"+userName); }} style={{ background:"none", border:"none", color:"#334155", fontSize:"0.75rem", cursor:"pointer" }}>Limpiar</button>
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                    {historial.map((h,i) => (
                      <div key={i} style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:10, padding:"10px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12 }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontWeight:600, fontSize:"0.88rem", color:"#e2e8f0", marginBottom:3 }}>{h.equipo}</div>
                          <div style={{ fontSize:"0.72rem", color:"#475569", display:"flex", gap:8, flexWrap:"wrap" }}>
                            <span style={{ color:"#60a5fa" }}>{h.talla}</span>
                            <span>{h.temp}</span>
                            <span>{h.eq}</span>
                            {h.colores && <span style={{ color:"#f472b6" }}>{h.colores}</span>}
                            <span style={{ color:"#f59e0b" }}>📦 {h.caja}</span>
                          </div>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                          <span style={{ fontSize:"0.68rem", color:"#334155" }}>{h.hora}</span>
                          <button onClick={() => navigator.clipboard.writeText(h.line).catch(()=>{})} title="Copiar"
                            style={{ background:"#1e293b", border:"none", borderRadius:6, padding:"4px 8px", cursor:"pointer", color:"#64748b", fontSize:"0.75rem" }}>📋</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {formError && <div style={{ background:"#f8711818", border:"1px solid #f8711850", borderRadius:12, padding:"14px 20px", color:"#f87178", textAlign:"center", fontSize:"0.88rem", marginBottom:24 }}>⚠️ {formError}</div>}

            </div>
          )}

                    {tab==="admin" && (
            <div style={{ maxWidth:1100, margin:"0 auto", padding:"32px 24px", animation:"fadeUp .35s ease" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, flexWrap:"wrap", gap:12 }}>
                <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.7rem", letterSpacing:"0.08em" }}>Inventario</div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
                  {[["todas","Todas"],["disponibles","Disponibles"],["vendidas","Vendidas"]].map(([id,label]) => (
                    <button key={id} onClick={() => setAdminFilter(id)} style={{ padding:"7px 14px", borderRadius:8, border:"none", cursor:"pointer", fontWeight:600, fontSize:"0.8rem", background:adminFilter===id?"#f59e0b":"#1e293b", color:adminFilter===id?"#080d18":"#64748b", transition:"all .2s" }}>{label}</button>
                  ))}
                  <select value={adminCaja} onChange={e => setAdminCaja(e.target.value)} style={{ padding:"7px 14px", borderRadius:8, background:"#1e293b", border:"1px solid #334155", color:"#94a3b8", fontSize:"0.8rem", cursor:"pointer" }}>
                    <option value="todas">Todas las cajas</option>
                    {allCajas.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <select value={adminTalla} onChange={e => setAdminTalla(e.target.value)} style={{ padding:"7px 14px", borderRadius:8, background:"#1e293b", border:"1px solid #334155", color:"#94a3b8", fontSize:"0.8rem", cursor:"pointer" }}>
                    <option value="todas">Todas las tallas</option>
                    {["S","M","L","XL","XXL","3XL","4XL","116","128","140","152","164"].map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                  <span style={{ color:"#475569", fontSize:"0.8rem" }}>{adminShirts.length} resultados</span>
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))", gap:10 }}>
                {adminShirts.map(s => {
                  const col = getCajaColor(s.categoria, allCajas);
                  return (
                    <div key={s.rowIndex} style={{ background:"#0f172a", border:`1px solid ${s.vendida?"#1e293b":`${col}30`}`, borderRadius:12, padding:"14px 16px", opacity:s.vendida?.45:1, transition:"opacity .2s", position:"relative" }}>
                      {s.vendida && <div style={{ position:"absolute", top:8, right:8, background:"#f8711825", border:"1px solid #f8711855", borderRadius:6, padding:"1px 7px", fontSize:"0.58rem", color:"#f87178", fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase" }}>Vendida</div>}
                      <div style={{ fontSize:"0.6rem", color:col, letterSpacing:"0.1em", textTransform:"uppercase", fontWeight:600, marginBottom:4 }}>{s.categoria}</div>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                        <Escudo url={s.escudo} equipo={s.equipo} size={28}/>
                        <div style={{ fontWeight:600, fontSize:"0.95rem", color:"#e2e8f0" }}>{s.equipo}</div>
                      </div>
                      <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:8 }}>
                        <Badge txt={s.talla} color="#60a5fa"/>
                        <Badge txt={s.eq} color="#38bdf8"/>
                        <Badge txt={s.temp} color="#94a3b8"/>
                        <Badge txt={s.marca} color="#34d399"/>
                        <Badge txt={s.liga} color="#a78bfa"/>
                        {s.colores && <Badge txt={s.colores} color="#f472b6"/>}
                      </div>
                      {s.caja && (
                        <div style={{ display:"flex", alignItems:"center", gap:6, background:"#080d18", borderRadius:8, padding:"6px 10px", marginBottom:8 }}>
                          <span style={{ fontSize:"0.8rem" }}>📦</span>
                          <span style={{ fontSize:"0.72rem", color:"#f59e0b", fontWeight:600 }}>{s.caja}</span>
                        </div>
                      )}
                      {s.vendida && s.vendedor && (
                        <div style={{ marginTop:8, paddingTop:8, borderTop:"1px solid #1e293b", fontSize:"0.72rem", color:"#475569", display:"flex", flexDirection:"column", gap:2 }}>
                          {s.vendedor && <span>👤 {s.vendedor}</span>}
                          {s.fechaVenta && <span>📅 {s.fechaVenta}</span>}
                          {s.numPedido && <span>📦 {s.numPedido}</span>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              {adminShirts.length===0 && <div style={{ textAlign:"center", color:"#334155", padding:"60px 0", fontSize:"0.9rem" }}>No hay camisetas con esos filtros.</div>}
            </div>
          )}

          {tab==="stats" && <StatsTab shirts={shirts} allCajas={allCajas}/>}

          {tab==="pedidos" && <PedidosTab shirts={shirts} allCajas={allCajas}/>}

          <div style={{ textAlign:"center", padding:"24px", color:"#1e293b", fontSize:"0.7rem" }}>
            Google Sheets · {SHEET_ID.slice(0,16)}…
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
